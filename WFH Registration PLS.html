<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>WFH Registration</title>
<style>
body{
font-family:Segoe UI,Arial;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:35px;
width:420px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

h2{
text-align:center;
color:#3b2a80;
margin-bottom:20px;
}

label{
font-weight:600;
display:block;
margin-top:12px;
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
border:1px solid #ccc;
border-radius:6px;
}

button{
margin-top:20px;
width:100%;
padding:12px;
border:none;
background:#0078D4;
color:white;
font-weight:700;
border-radius:8px;
cursor:pointer;
}

button:hover </style>

</head>

<body>

<div class="container">

<h2>WFH Registration (19–25 March 2026)</h2>

<form>

<label>Full Name</label> <input type="text" required>

<label>Email</label> <input type="email" required>

<label>High Speed WiFi Available?</label> <select>

<option>Yes</option>
<option>No</option>
</select>

<label>Company Laptop?</label> <select>

<option>Yes</option>
<option>No</option>
</select>

<label>Location</label> <select>

<option>Bangalore</option>
<option>Chennai</option>
<option>Hyderabad</option>
<option>Pune</option>
</select>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
